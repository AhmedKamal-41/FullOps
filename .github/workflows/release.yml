# Release build. Triggered only by a version tag a human pushes (v1.2.3), never by an
# ordinary branch push. It rebuilds the four service jars from the tagged commit and
# attaches them to the GitHub Release as downloadable artifacts.
#
# Container images are intentionally NOT published here: this project does not push to
# a registry as part of its automated build (see docs/RELEASE.md for the rationale and
# the manual publish steps if a registry is ever wanted).

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release-artifacts:
    name: Build and attach service jars
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the release and upload assets
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # Full verify so a tag is never released without its tests and coverage gate passing.
      - name: Build and verify
        run: ./mvnw -B verify
      - name: Collect service jars
        run: |
          mkdir -p release-artifacts
          cp services/*/target/*-service.jar release-artifacts/
          ls -l release-artifacts
      - name: Create release and upload jars
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*.jar
          generate_release_notes: true
