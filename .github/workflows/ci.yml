name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Format, build, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check code formatting
        run: ./mvnw -B spotless:check

      - name: Build and test
        run: ./mvnw -B clean verify

  docker-build:
    name: Build service images (no push)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build order-service image
        run: docker build -f services/order-service/Dockerfile -t fulfillops/order-service:ci .

      - name: Build inventory-service image
        run: docker build -f services/inventory-service/Dockerfile -t fulfillops/inventory-service:ci .

      - name: Build payment-service image
        run: docker build -f services/payment-service/Dockerfile -t fulfillops/payment-service:ci .

      - name: Build fulfillment-service image
        run: docker build -f services/fulfillment-service/Dockerfile -t fulfillops/fulfillment-service:ci .
