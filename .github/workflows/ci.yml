# Continuous integration for FulfillOps.
#
# The pipeline is split into focused jobs so a failure points at one concern — a
# formatting slip, a broken integration test, an uncovered service, a frontend
# regression, a vulnerable image — instead of one long opaque "build" step. Jobs
# that do not depend on each other run in parallel; the image jobs wait for the
# backend to prove itself first.
#
# Third-party actions are pinned to a released version tag and kept current by
# .github/dependabot.yml. Pinning each to an immutable commit SHA is the stronger
# supply-chain posture and is tracked as a follow-up (see docs/RELEASE.md) — it was
# left as a tag pin here rather than committing SHAs that could not be verified from
# this offline build environment.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege by default. Individual jobs opt into the extra scopes they need.
permissions:
  contents: read

# A newer push to the same ref makes an in-flight run redundant; cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

jobs:
  backend-format-and-unit:
    name: Backend format check and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Check formatting
        run: ./mvnw -B spotless:check
      - name: Unit tests (Surefire) and ArchUnit boundary rules
        run: ./mvnw -B test
      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/**"

  backend-integration-and-coverage:
    name: Backend integration tests and coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      # `verify` runs the Testcontainers integration tests (Docker is available on the
      # GitHub-hosted runner) and then the JaCoCo coverage gate on business code. Both
      # the integration tests and the coverage threshold must pass for this job to be
      # green — the gate is defined in the root pom (coverage.business.line.minimum).
      - name: Integration tests and JaCoCo coverage gate
        run: ./mvnw -B verify
      - name: Upload test and coverage reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-and-coverage-reports
          path: |
            **/target/failsafe-reports/**
            **/target/surefire-reports/**
            **/target/site/jacoco/**

  event-contracts:
    name: Event contract compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      # Validates every example fixture against its JSON Schema, so a schema and its
      # documented example can never drift apart. This is the contract check other
      # services build against.
      - name: Validate event schemas and examples
        run: ./mvnw -B -pl contracts test

  frontend:
    name: Frontend lint, unit tests, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ops-console
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/ops-console/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  frontend-e2e:
    name: Frontend end-to-end tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ops-console
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/ops-console/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # The console has a self-contained demo mode (mocked API), so the end-to-end
      # suite runs against the Vite dev server without any backend or infrastructure.
      - name: Run Playwright tests
        run: npm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/ops-console/playwright-report/**

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Review dependency changes for known vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  build-images:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: [backend-format-and-unit, backend-integration-and-coverage]
    strategy:
      fail-fast: false
      matrix:
        service: [order-service, inventory-service, payment-service, fulfillment-service]
    steps:
      - uses: actions/checkout@v4
      # Build only — images are never pushed from CI. Later jobs scan and inventory
      # them from the tarball uploaded here.
      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t fulfillops/${{ matrix.service }}:ci \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            .
      - name: Save image tarball
        run: docker save fulfillops/${{ matrix.service }}:ci -o ${{ matrix.service }}.tar
      - name: Upload image tarball
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.service }}
          path: ${{ matrix.service }}.tar
          retention-days: 1

  scan-images:
    name: Scan ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [order-service, inventory-service, payment-service, fulfillment-service]
    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
      - name: Load image
        run: docker load -i ${{ matrix.service }}.tar
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: fulfillops/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          # Demo default: fail only on fixable CRITICAL findings so a base-image CVE with
          # no upstream fix yet does not block the pipeline. Tighten per environment.
          severity: CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"
      - name: Upload scan results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  sbom:
    name: SBOM for ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: build-images
    strategy:
      fail-fast: false
      matrix:
        service: [order-service, inventory-service, payment-service, fulfillment-service]
    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
      - name: Load image
        run: docker load -i ${{ matrix.service }}.tar
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: fulfillops/${{ matrix.service }}:ci
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
