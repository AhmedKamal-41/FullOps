spring:
  application:
    name: order-service
  task:
    scheduling:
      pool:
        # Spring Boot's own default here is a single thread shared by every @Scheduled method in
        # the process. OutboxRelay's publish loop can legitimately block for tens of seconds
        # during a real Kafka outage (see tests/failure-scenarios/kafka-outage-outbox-backlog.sh)
        # — with only one thread, that block would also stop OutboxBacklogMetrics and (in
        # order-service) ReconciliationScheduler from ever running, going dark on exactly the
        # incident this phase's dashboards/alerts exist to surface.
        size: 5
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    # Lets Spring for Apache Kafka's Observation API time each publish/consume and propagate
    # the W3C traceparent header across the topic, so one trace can cross a Kafka boundary.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20

server:
  port: 8081

app:
  messaging:
    topic: fulfillops.order.events
    inventory-events-topic: fulfillops.inventory.events
    payment-events-topic: fulfillops.payment.events
    fulfillment-events-topic: fulfillops.fulfillment.events
  reconciliation:
    interval-ms: 60000
    stuck-threshold: PT30M
    cancellation-stuck-threshold: PT10M
  ops:
    sla:
      # Demonstration defaults, not measured targets — an operator would tune these per real
      # environment. "Stuck" reuses app.reconciliation.stuck-threshold/cancellation-stuck-threshold
      # above rather than defining a second, parallel notion of stuck.
      stage-thresholds:
        PENDING: PT15M
        INVENTORY_RESERVED: PT30M
        PAYMENT_AUTHORIZED: PT30M
        FULFILLMENT_ASSIGNED: PT1H
        PICKING: PT4H
        PACKED: PT4H
        DISPATCHED: PT48H
      age-buckets: PT1H,PT4H,PT24H
    cache:
      ttl-seconds: 30
  cors:
    # The ops console's dev server (Phase 10) — not a secret, override per environment if needed.
    allowed-origin: http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # Demo default: trace every request so the failure scenarios always have something to
      # show. A real environment would sample far less to control trace-backend volume/cost.
      probability: 1.0
  # management.otlp.tracing.endpoint is deprecated (error level) as of Boot 4.0 — this is its
  # replacement (see spring-boot-micrometer-tracing-opentelemetry's configuration metadata).
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        # Prometheus (scrape-based, via /actuator/prometheus) is this project's one metrics
        # pipeline — without this, Boot also auto-configures an OTLP metrics push to Tempo's
        # OTLP endpoint, which only understands traces and just logs a warning every push.
        enabled: false

# Built into Spring Boot since 3.4 — no extra logging library dependency needed. MDC content
# (correlationId, eventId, aggregateId, environment — see CorrelationIdFilter and the Kafka
# listeners) is included automatically in the JSON output, alongside traceId/spanId once tracing
# is active.
logging:
  structured:
    format:
      console: logstash
