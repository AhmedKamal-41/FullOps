# Same env-var-driven infrastructure as "local" (still points at whatever
# DB_HOST/KAFKA_BOOTSTRAP_SERVERS/etc. the environment supplies — this repo has no
# separate production infrastructure), but with production-realistic hardening:
# health details are hidden from unauthenticated callers instead of shown freely.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${PAYMENT_DB_NAME}
    username: ${PAYMENT_DB_USERNAME}
    password: ${PAYMENT_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI}

management:
  endpoint:
    health:
      show-details: when-authorized

# Built into Spring Boot since 3.4 — no extra logging library dependency needed. MDC
# content (correlationId, eventId — see CorrelationIdFilter and OutboxRelay/
# InboxEventListener) is included automatically in the JSON output.
logging:
  structured:
    format:
      console: logstash
