# Local development against the Docker Compose stack (infra/compose). Every value
# below must come from the environment — see .env.example — so a missing variable
# fails startup immediately instead of silently using a production-looking default.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${PAYMENT_DB_NAME}
    username: ${PAYMENT_DB_USERNAME}
    password: ${PAYMENT_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI}

management:
  endpoint:
    health:
      show-details: always
