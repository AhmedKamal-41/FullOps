spring:
  application:
    name: fulfillment-service
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: fulfillment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  messaging:
    topic: fulfillops.fulfillment.events
    payment-events-topic: fulfillops.payment.events
    order-events-topic: fulfillops.order.events
  fulfillment:
    sla-duration: PT24H
    warehouse-ids: WH-ATL-1,WH-DFW-2,WH-SEA-3,WH-ORD-4
  cors:
    # The ops console's dev server (Phase 10) — not a secret, override per environment if needed.
    allowed-origin: http://localhost:5173
