      DB_HOST: postgres
      DB_PORT: "5432"
      INVENTORY_DB_NAME: ${INVENTORY_DB_NAME}
      INVENTORY_DB_USERNAME: ${INVENTORY_DB_USERNAME}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OIDC_ISSUER_URI: http://host.docker.internal:8080/realms/fulfillops
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8082:8082"

  payment-service:
