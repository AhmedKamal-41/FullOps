# Local-only scrape config. Every app service runs on the host (see `make run-order` etc. and
# docs/OPERATIONS_RUNBOOK.md), not inside this Compose network, so Prometheus reaches
# them via host.docker.internal — the container's `extra_hosts` entry in docker-compose.yml is
# what makes that hostname resolve on Linux (Docker Desktop provides it natively).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: order-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: inventory-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          service: payment-service

  - job_name: fulfillment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]
        labels:
          service: fulfillment-service
