# Local-only platform: PostgreSQL (one database/user per service), Kafka (KRaft,
# single node), Redis, and Keycloak. Run from the repository root via the Makefile
# targets (`make infra-up`, etc.), which pass --env-file .env so these variables
# resolve. See docs/runbooks/local-infrastructure.md for startup order and
# troubleshooting.
#
# Every image tag below is pinned to a specific version — never `latest` — so a
# `docker compose pull` doesn't silently change what "local" means.

services:
  postgres:
    image: postgres:17.10-alpine
    container_name: fulfillops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      FULFILLMENT_DB_PASSWORD: ${FULFILLMENT_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: apache/kafka:4.3.1
    container_name: fulfillops-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:8.8.0-alpine
    container_name: fulfillops-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Fictional realm, users, and client secrets only — see infra/keycloak/realm-export.json
  # and docs/runbooks/local-infrastructure.md. Nothing here is a real credential.
  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: fulfillops-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Pins the token issuer to a single, fixed URL regardless of whether it's
      # reached from the host or from another container, so JWT `iss` validation
      # is consistent everywhere. See docs/runbooks/local-infrastructure.md.
      KC_HOSTNAME: "http://localhost:8080"
      KC_HEALTH_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/fulfillops-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # --- Observability (Phase 11) ---------------------------------------------------------
  # All four app services still run on the host (make run-order etc.), not in this Compose
  # network — see docs/runbooks/local-infrastructure.md. Prometheus reaches them via
  # host.docker.internal; Tempo and Grafana are reached by the host services/browser via their
  # published ports below.

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: fulfillops-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  tempo:
    image: grafana/tempo:2.6.1
    container_name: fulfillops-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo query API (used by Grafana's Tempo datasource)
      - "4317:4317" # OTLP gRPC — not used by the app services (they use HTTP/4318) but published
                    # for any OTLP CLI tooling used during failure demos.
      - "4318:4318" # OTLP HTTP — this is what management.otlp.tracing.endpoint points at.

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fulfillops-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Local demo only — see docs/runbooks/local-infrastructure.md. Never a real credential.
      GF_SECURITY_ADMIN_PASSWORD: "fulfillops-local-only-pw"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  tempo-data:
  grafana-data:
