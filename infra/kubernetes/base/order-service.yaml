apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: fulfillops
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: fulfillops
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
        app.kubernetes.io/part-of: fulfillops
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: order-service
          image: fulfillops/order-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          # All shared, non-secret config (infra addresses, database names). The service
          # reads only the keys it needs; the rest are harmless extras.
          envFrom:
            - configMapRef:
                name: fulfillops-shared
          env:
            # Keep the JVM heap inside the container memory limit below.
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: ORDER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fulfillops-secrets
                  key: ORDER_DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fulfillops-secrets
                  key: REDIS_PASSWORD
          # Boot's dedicated liveness/readiness probe groups (Phase 2 enabled them).
          # A generous startup probe covers slow JVM warm-up so liveness never trips
          # during boot.
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # The container root filesystem is read-only; the JVM still needs a writable /tmp.
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: fulfillops
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: fulfillops
spec:
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - name: http
      port: 8081
      targetPort: http
