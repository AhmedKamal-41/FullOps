# TEMPLATE ONLY — no real values, and deliberately NOT referenced by kustomization.yaml
# so `kubectl kustomize` never emits a Secret with placeholder values.
#
# The four services expect a Secret named `fulfillops-secrets` holding the per-service
# database passwords and the Redis password. Two ways to create it:
#
#   1. The kind deploy script (scripts/kind-deploy.sh) creates it from the repo .env
#      file with `kubectl create secret generic fulfillops-secrets --from-env-file`.
#   2. For any other environment, copy this file to secret.yaml (git-ignored), fill in
#      real values, and `kubectl apply` it — or, far better, use a real secrets manager
#      (Sealed Secrets, External Secrets, SSM/Secrets Manager) instead of a plain file.
#
# Every value below is the literal string REPLACE_ME on purpose. Do not commit real
# secrets to this repository.
apiVersion: v1
kind: Secret
metadata:
  name: fulfillops-secrets
  namespace: fulfillops
type: Opaque
stringData:
  ORDER_DB_PASSWORD: REPLACE_ME
  INVENTORY_DB_PASSWORD: REPLACE_ME
  PAYMENT_DB_PASSWORD: REPLACE_ME
  FULFILLMENT_DB_PASSWORD: REPLACE_ME
  REDIS_PASSWORD: REPLACE_ME
