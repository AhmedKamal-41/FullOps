# One PDB per service. With two replicas, minAvailable: 1 lets a voluntary disruption
# (node drain, rollout) take at most one replica at a time, so each service keeps
# serving throughout. PDBs only constrain *voluntary* disruptions — they are meaningful
# because every service runs more than one replica.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: order-service
  namespace: fulfillops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inventory-service
  namespace: fulfillops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-service
  namespace: fulfillops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
---
apiVersion: policy/v1
