apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# secret.example.yaml is intentionally NOT listed here — it is a template with
# placeholder values, created for real out of band (see secret.example.yaml and
# scripts/kind-deploy.sh). Keeping it out of the build means `kubectl kustomize`
# never emits a Secret full of REPLACE_ME values.
resources:
  - namespace.yaml
  - configmap.yaml
  - order-service.yaml
  - inventory-service.yaml
  - payment-service.yaml
  - fulfillment-service.yaml
  - pod-disruption-budgets.yaml
  - network-policies.yaml
