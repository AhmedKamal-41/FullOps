apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-service
  namespace: fulfillops
  labels:
    app.kubernetes.io/name: fulfillment-service
    app.kubernetes.io/part-of: fulfillops
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fulfillment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fulfillment-service
        app.kubernetes.io/part-of: fulfillops
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fulfillment-service
          image: fulfillops/fulfillment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          envFrom:
            - configMapRef:
                name: fulfillops-shared
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: FULFILLMENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fulfillops-secrets
                  key: FULFILLMENT_DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fulfillops-secrets
                  key: REDIS_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fulfillment-service
  namespace: fulfillops
  labels:
    app.kubernetes.io/name: fulfillment-service
    app.kubernetes.io/part-of: fulfillops
spec:
  selector:
    app.kubernetes.io/name: fulfillment-service
  ports:
    - name: http
      port: 8084
      targetPort: http
